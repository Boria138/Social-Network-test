<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voxii - Login</title>

    <meta name="description" content="Voxii — real-time chat with voice and video calls">
    <meta name="theme-color" content="#5865f2">

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">

    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-lang-switch" role="group" aria-label="Language switch">
                <button type="button" id="langEnBtn" class="lang-btn" aria-pressed="false">EN</button>
                <button type="button" id="langRuBtn" class="lang-btn" aria-pressed="false">RU</button>
            </div>
            <div class="logo">
                <!-- Voxii PNG logo (place file in your project, e.g. /assets/voxii-logo.png) -->
                <img
                    src="assets/voxii-logo.png"
                    alt="Voxii"
                    width="124"
                    height="34"
                    style="display:block; margin:0 auto 12px; object-fit:contain;"
                />

                <h1 data-i18n="auth.welcomeBack">Welcome back!</h1>
                <p data-i18n="auth.welcomeSubtitle">We're so excited to see you again!</p>
            </div>

            <form id="authForm">
                <div class="form-group" id="usernameGroup">
                    <label for="username" data-i18n="auth.username">USERNAME</label>
                    <input type="text" id="username" name="username" required>
                </div>

                <div class="form-group" id="emailGroup">
                    <label for="email" data-i18n="auth.email">EMAIL</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="password" data-i18n="auth.password">PASSWORD</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <div class="form-group" id="confirmPasswordGroup" style="display: none;">
                    <label for="confirmPassword" data-i18n="auth.confirmPassword">CONFIRM PASSWORD</label>
                    <input type="password" id="confirmPassword" name="confirmPassword">
                </div>

                <button type="submit" class="submit-btn" id="submitBtn" data-i18n="auth.loginBtn">Log In</button>

                <div class="switch-mode">
                    <span id="switchText" data-i18n="auth.needAccount">Need an account?</span>
                    <a href="#" id="switchLink" data-i18n="auth.registerLink">Register</a>
                </div>
            </form>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="auth.js"></script>
</body>
</html>
